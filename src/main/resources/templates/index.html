<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ситилинк - Товары дня</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .citilink-orange { background-color: #ff4e00; }
        .citilink-orange-text { color: #ff4e00; }
        .citilink-orange-hover:hover { background-color: #e64600; }
        .timer-block {
            background-color: #ff4e00;
            color: white;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 2.25rem;
            line-height: 1;
            min-width: 60px;
            text-align: center;
        }
        .timer-separator {
            color: #ff4e00;
            font-weight: bold;
            font-size: 2.25rem;
            margin: 0 4px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">

<!-- Навигация (Header) -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <a th:href="@{/}" class="flex items-center space-x-2 hover:opacity-90 transition">
            <div class="citilink-orange text-white p-2 rounded-lg font-bold text-xl tracking-tight">
                CITILINK
            </div>
        </a>

        <div class="hidden md:flex flex-grow mx-8">
            <input type="text" placeholder="Поиск товаров..."
                   class="w-full border-2 border-gray-200 rounded-l-lg px-4 py-2 focus:outline-none focus:border-orange-500">
            <button class="citilink-orange text-white px-6 rounded-r-lg citilink-orange-hover transition">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <a th:href="@{/cart}" class="flex items-center space-x-2 text-gray-700 hover:text-orange-600 transition relative">
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span th:text="${cartItemsCount}"
                      class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
                        0
                    </span>
            </div>
            <span class="hidden sm:inline font-medium">Корзина</span>
        </a>
    </div>
</header>

<main class="container mx-auto px-4 py-8 flex-grow">
    <!-- Заголовок и Таймер -->
    <div class="flex items-center space-x-6 mb-10">
        <h1 class="text-4xl font-bold text-gray-800 tracking-tight">Товары дня</h1>
        <div id="global-timer" class="flex items-center">
            <div id="hours" class="timer-block">00</div>
            <div class="timer-separator">:</div>
            <div id="minutes" class="timer-block">00</div>
            <div class="timer-separator">:</div>
            <div id="seconds" class="timer-block">00</div>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div th:each="product : ${productsOfDay}"
             class="bg-white rounded-xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden flex flex-col border border-transparent hover:border-orange-200">
            <div class="relative">
                <div class="h-48 bg-gray-50 flex items-center justify-center p-4">
                    <i class="fa-solid fa-laptop text-gray-200 text-7xl"></i>
                </div>
            </div>
            <div class="p-5 flex flex-col flex-grow">
                <h3 th:text="${product.name}" class="text-gray-800 font-semibold text-lg mb-2 line-clamp-2 h-14">Название товара</h3>
                <p th:text="${product.description}" class="text-gray-500 text-sm mb-4 line-clamp-2 italic">Описание...</p>
                <div class="mt-auto">
                    <div class="flex items-baseline space-x-2 mb-3">
                        <span th:text="${#numbers.formatDecimal(product.price, 0, 'WHITESPACE', 0, 'POINT')} + ' ₽'" class="text-2xl font-black text-gray-900">0 ₽</span>
                    </div>
                    <form th:if="${!#lists.contains(cartProductIds, product.id)}"
                          th:action="@{/cart/add}" method="post"
                          class="m-0 p-0">

                        <input type="hidden" name="productId" th:value="${product.id}">

                        <button type="submit"
                                class="w-full py-3 px-4 border-2 border-transparent citilink-orange text-white font-bold rounded-lg citilink-orange-hover transition flex items-center justify-center space-x-3 shadow-lg shadow-orange-200 box-border">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span>В корзину</span>
                        </button>
                    </form>

                    <div th:if="${#lists.contains(cartProductIds, product.id)}">
                        <a th:href="@{/cart}"
                           class="w-full py-3 px-4 border-2 border-gray-200 text-gray-400 font-bold rounded-lg hover:border-orange-500 hover:text-orange-500 transition flex items-center justify-center space-x-3 bg-white box-border">
                            <i class="fa-solid fa-check"></i>
                            <span>В корзине</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(productsOfDay)}" class="col-span-full py-20 text-center">
            <i class="fa-solid fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">Сегодня специальных предложений нет</p>
        </div>
    </div>
</main>

<footer class="bg-gray-800 text-gray-400 py-10">
    <div class="container mx-auto px-4 text-center">
        <p class="text-sm uppercase tracking-widest mb-2 font-bold">Citilink Project</p>
        <p class="text-xs">&copy; 2026</p>
    </div>
</footer>

<script>
    function updateTimer() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const diff = tomorrow - now;
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        document.getElementById('hours').innerText = String(hours).padStart(2, '0');
        document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
        document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
