<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка принята — Ситилинк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .citilink-orange { background-color: #ff4e00; }
        .citilink-orange-text { color: #ff4e00; }
        .citilink-orange-hover:hover { background-color: #e64600; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <a th:href="@{/}" class="flex items-center space-x-2 hover:opacity-90 transition">
            <div class="citilink-orange text-white p-2 rounded-lg font-bold text-xl tracking-tight">
                CITILINK
            </div>
        </a>

        <div class="hidden md:flex flex-grow mx-8">
            <input type="text" placeholder="Поиск товаров..."
                   class="w-full border-2 border-gray-200 rounded-l-lg px-4 py-2 focus:outline-none focus:border-orange-500">
            <button class="citilink-orange text-white px-6 rounded-r-lg citilink-orange-hover transition">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <a th:href="@{/cart}" class="flex items-center space-x-2 text-gray-700 hover:text-orange-600 transition relative">
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span th:text="${cartItemsCount ?: 0}"
                      class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
                        0
                    </span>
            </div>
            <span class="hidden sm:inline font-medium">Корзина</span>
        </a>
    </div>
</header>

<main class="container mx-auto px-4 py-16 flex-grow flex items-center justify-center">
    <div class="max-w-2xl w-full bg-white rounded-3xl p-12 shadow-sm text-center border-2 border-orange-50">
        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center text-green-500 text-4xl mx-auto mb-8">
            <i class="fa-solid fa-phone-volume"></i>
        </div>

        <h1 class="text-4xl font-black text-gray-800 mb-6 tracking-tight">Заявка принята!</h1>

        <div class="space-y-4 text-lg text-gray-500 mb-10 leading-relaxed">
            <p>Ваша заявка на кредит успешно одобрена банком <span class="font-bold text-gray-800" th:text="${creditApplication.selectedOffer.bankName}">Название банка.</span>
            <p>Пожалуйста, оставайтесь на связи. В ближайшее время вам позвонит <span class="font-bold text-orange-500">менеджер Ситилинка</span> для подписания договора оффлайн.</p>
        </div>

        <a th:href="@{/}" class="inline-block citilink-orange text-white px-12 py-4 rounded-xl font-bold text-lg citilink-orange-hover transition shadow-lg shadow-orange-100">
            На главную страницу
        </a>
    </div>
</main>

<footer class="bg-gray-800 text-gray-400 py-10 mt-auto">
    <div class="container mx-auto px-4 text-center">
        <p class="text-sm uppercase tracking-widest mb-2 font-bold text-gray-500">Citilink Project</p>
        <p class="text-xs">&copy; 2026</p>
    </div>
</footer>

</body>
</html>
