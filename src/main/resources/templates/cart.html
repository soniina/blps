<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Ситилинк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .citilink-orange { background-color: #ff4e00; }
        .citilink-orange-text { color: #ff4e00; }
        .citilink-orange-hover:hover { background-color: #e64600; }
        .quantity-btn {
            border: 2px solid #e5e7eb;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .quantity-btn:hover { border-color: #ff4e00; color: #ff4e00; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">

<!-- Навигация (Header) - Абсолютно идентичен главной -->
<header class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
        <a th:href="@{/}" class="flex items-center space-x-2 hover:opacity-90 transition">
            <div class="citilink-orange text-white p-2 rounded-lg font-bold text-xl tracking-tight">
                CITILINK
            </div>
        </a>

        <div class="hidden md:flex flex-grow mx-8">
            <input type="text" placeholder="Поиск товаров..."
                   class="w-full border-2 border-gray-200 rounded-l-lg px-4 py-2 focus:outline-none focus:border-orange-500">
            <button class="citilink-orange text-white px-6 rounded-r-lg citilink-orange-hover transition">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <a th:href="@{/cart}" class="flex items-center space-x-2 text-gray-700 hover:text-orange-600 transition relative">
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span th:text="${cartItemsCount ?: 0}"
                      class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
                        0
                </span>
            </div>
            <span class="hidden sm:inline font-medium">Корзина</span>
        </a>
    </div>
</header>

<main class="container mx-auto px-4 py-8 flex-grow">
    <!-- Заголовок в том же месте, что и на главной (через идентичный flex-контейнер) -->
    <div class="flex items-center space-x-6 mb-10">
        <h1 class="text-4xl font-bold text-gray-800 tracking-tight">Корзина</h1>
    </div>

    <!-- Если корзина пуста -->
    <div th:if="${#lists.isEmpty(cartItems)}" class="bg-white rounded-2xl p-12 text-center shadow-sm">
        <div class="mb-6">
            <i class="fa-solid fa-cart-plus text-gray-200 text-8xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">В корзине пока пусто</h2>
        <p class="text-gray-500 mb-8">Загляните в «Товары дня», чтобы найти что-нибудь интересное</p>
        <a th:href="@{/}" class="citilink-orange text-white px-8 py-3 rounded-xl font-bold citilink-orange-hover transition">
            Перейти к покупкам
        </a>
    </div>

    <!-- Основная сетка корзины -->
    <div th:if="${not #lists.isEmpty(cartItems)}" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-4">
            <div th:each="item : ${cartItems}" class="bg-white rounded-2xl p-6 shadow-sm flex flex-col sm:flex-row items-center gap-6 border border-transparent hover:border-gray-200 transition">
                <div class="w-24 h-24 bg-gray-50 rounded-xl flex items-center justify-center text-4xl text-gray-200 flex-shrink-0">
                    <i class="fa-solid fa-laptop"></i>
                </div>
                <div class="flex-grow text-center sm:text-left">
                    <h3 th:text="${item.product.name}" class="text-lg font-bold text-gray-800 mb-1 leading-tight">Название товара</h3>
                    <p class="text-sm text-gray-400 mb-4" th:text="'Код: ' + (100000 + ${item.product.id})">Код: 123456</p>
                    <form th:action="@{/cart/remove/{id}(id=${item.id})}" th:method="delete" class="inline">
                        <button type="submit" class="text-xs font-bold text-gray-400 hover:text-red-500 transition uppercase tracking-wider flex items-center">
                            <i class="fa-solid fa-trash-can mr-1"></i> Удалить
                        </button>
                    </form>
                </div>
                <div class="flex items-center space-x-3 bg-gray-50 p-2 rounded-xl">

                    <form th:action="@{/cart/update/{id}(id=${item.id})}" th:method="put" class="inline">
                        <input type="hidden" name="delta" value="-1">
                        <button type="submit"
                                th:disabled="${item.quantity <= 1}"
                                class="quantity-btn bg-white hover:shadow-sm disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:border-gray-200">
                            <i class="fa-solid fa-minus text-xs"></i>
                        </button>
                    </form>

                    <span th:text="${item.quantity}" class="w-8 text-center font-bold text-lg">1</span>

                    <form th:action="@{/cart/update/{id}(id=${item.id})}" th:method="put" class="inline">
                        <input type="hidden" name="delta" value="1">
                        <button type="submit"
                                th:disabled="${item.quantity >= item.product.stockQuantity}"
                                class="quantity-btn bg-white hover:shadow-sm disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:border-gray-200">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                    </form>
                </div>

                <p th:if="${item.quantity >= item.product.stockQuantity}"
                   class="text-[10px] text-orange-500 font-bold mt-1 uppercase text-center">
                    Максимум
                </p>
                <div class="text-right min-w-[120px]">
                    <p th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'WHITESPACE', 0, 'POINT')} + ' ₽'"
                       class="text-2xl font-black text-gray-900 whitespace-nowrap">0 ₽</p>

                    <p th:if="${item.quantity > 1}"
                       th:text="${#numbers.formatDecimal(item.product.price, 0, 'WHITESPACE', 0, 'POINT')} + ' ₽ / шт.'"
                       class="text-xs text-gray-400 font-medium whitespace-nowrap"></p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="bg-white rounded-2xl p-8 shadow-xl border-2 border-orange-50 sticky top-24">
                <h2 class="text-xl font-bold text-gray-800 mb-6">Детали заказа</h2>
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-gray-500">
                        <span>Товары (<span th:text="${cartItemsCount}">0</span>)</span>
                        <span th:text="${#numbers.formatDecimal(totalPrice, 0, 'WHITESPACE', 0, 'POINT')} + ' ₽'">0 ₽</span>
                    </div>
                    <div class="flex justify-between text-gray-500">
                        <span>Скидка</span>
                        <span class="text-green-600 font-bold">0 ₽</span>
                    </div>
                    <div class="h-px bg-gray-100 my-4"></div>
                    <div class="flex justify-between items-end">
                        <span class="text-lg font-bold">Итого</span>
                        <div class="text-right">
                            <p th:text="${#numbers.formatDecimal(totalPrice, 0, 'WHITESPACE', 0, 'POINT')} + ' ₽'" class="text-4xl font-black citilink-orange-text leading-none mb-1">0 ₽</p>
                        </div>
                    </div>
                </div>
                <form th:action="@{/checkout/recipient}" method="get">
                    <button type="submit" class="w-full citilink-orange text-white py-5 rounded-2xl font-bold text-xl citilink-orange-hover transition shadow-lg shadow-orange-100 flex items-center justify-center group">
                        <span>Оформить заказ</span>
                        <i class="fa-solid fa-arrow-right ml-3 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </form>
                <div class="mt-6 flex items-center justify-center space-x-2 text-gray-400">
                    <i class="fa-solid fa-shield-halved text-sm"></i>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-gray-800 text-gray-400 py-10">
    <div class="container mx-auto px-4 text-center">
        <p class="text-sm uppercase tracking-widest mb-2 font-bold">Citilink Project</p>
        <p class="text-xs">&copy; 2026</p>
    </div>
</footer>

</body>
</html>
